services:

  # ─── Ollama LLM ────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: chatbot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment the lines below if your machine has an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    # Lip-sync: mount rhubarb binary from host (optional).
    # Set RHUBARB_PATH=/usr/local/bin/rhubarb in backend/.env to enable.
    # volumes:
    #   - /path/to/rhubarb:/usr/local/bin/rhubarb:ro

  # ─── Frontend (React → Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatbot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  ollama_data:
