services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      # Override host để trỏ sang ollama service thay vì localhost
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
